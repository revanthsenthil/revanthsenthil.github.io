<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Revanth Senthil</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <header>
    <nav>
      <span class="brand"><a href="index.html">🤖 revanth</a></span>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#publications">Research</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="resume.html">CV</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
  </header>

  <main>
    <section class="contact-page">
      <h2>Get in Touch</h2>
      
      <div class="contact-container">
        <div class="contact-intro">
          <p>I'm always interested in hearing about new research opportunities, collaborations, or just connecting with fellow robotics enthusiasts. Feel free to reach out!</p>
        </div>

        <form class="contact-form" action="https://formspree.io/f/xkononqk" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <button type="submit" class="submit-button">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>
        </form>

        <div class="contact-divider">
          <span>Or connect with me here</span>
        </div>

        <div class="social-icons">
          <a href="https://github.com/revanthsenthil" target="_blank" aria-label="GitHub" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="mailto:revanths@andrew.cmu.edu" aria-label="Email" title="Email">
            <i class="fas fa-envelope"></i>
          </a>
          <a href="https://www.linkedin.com/in/revanth-senthilkumaran" target="_blank" aria-label="LinkedIn" title="LinkedIn">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="https://scholar.google.com/citations?user=p4oXJvQAAAAJ&hl=en" target="_blank" aria-label="Google Scholar" title="Google Scholar">
            <i class="fas fa-graduation-cap"></i>
          </a>
          <a href="https://twitter.com/revvozz" target="_blank" aria-label="Twitter" title="Twitter">
            <i class="fab fa-twitter"></i>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://github.com/revanthsenthil" target="_blank" aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="mailto:revanths@andrew.cmu.edu" aria-label="Email">
        <i class="fas fa-envelope"></i>
      </a>
      <a href="https://www.linkedin.com/in/revanth-senthilkumaran" target="_blank" aria-label="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>
      <a href="https://scholar.google.com/citations?user=p4oXJvQAAAAJ&hl=en" target="_blank" aria-label="Google Scholar">
        <i class="fas fa-graduation-cap"></i>
      </a>
      <a href="https://twitter.com/revvozz" target="_blank" aria-label="Twitter">
        <i class="fab fa-twitter"></i>
      </a>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
